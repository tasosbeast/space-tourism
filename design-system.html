<html>
  <head>
    <title>Design system</title>

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Bellefair&family=Barlow:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="index.css" />

    <style></style>
  </head>
  <body class="bg-dark text-white">
    <div class="container">
      <h1>Design system</h1>

      <section id="colors">
        <h2><span style="opacity: 0.5">01</span> colors</h2>
        <div class="flex">
          <div style="flex-grow: 1">
            <div
              class="bg-dark text-white"
              style="padding: 3rem 1rem 1rem; border: 1px solid white"
            >
              <p style="opacity: 0.5">#0B0D17</p>
              <p>BLUE-900</p>
            </div>
            <p>
              <span class="text-light" style="margin-right: 15px">RGB</span> 11,
              13, 23
            </p>
            <p>
              <span class="text-light" style="margin-right: 15px">HSL</span>
              230°, 35%, 7%
            </p>
          </div>
          <div style="flex-grow: 1">
            <div
              class="bg-light text-dark"
              style="padding: 3rem 1rem 1rem; border: 1px solid white"
            >
              <p style="opacity: 0.5">#D0D6F9</p>
              <p>BLUE-300</p>
            </div>
            <p>
              <span class="text-light" style="margin-right: 15px">RGB</span>
              208, 214, 249
            </p>
            <p>
              <span class="text-light" style="margin-right: 15px">HSL</span>
              231°, 77%, 90%
            </p>
          </div>
          <div style="flex-grow: 1">
            <div
              class="bg-white text-dark"
              style="padding: 3rem 1rem 1rem; border: 1px solid white"
            >
              <p style="opacity: 0.5">#FFFFFF</p>
              <p>WHITE</p>
            </div>
            <p>
              <span class="text-light" style="margin-right: 15px">RGB</span>
              255, 255, 255
            </p>
            <p>
              <span class="text-light" style="margin-right: 15px">HSL</span> 0°,
              0%, 100%
            </p>
          </div>
        </div>
      </section>
    </div>

    <script src="index.pack.js"></script>
  </body>
</html>
